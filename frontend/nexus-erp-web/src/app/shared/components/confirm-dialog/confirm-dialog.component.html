<div class="confirm-dialog" [class.is-warn]="data.confirmColor === 'warn'">
  @if (data.icon) {
    <div class="dialog-icon" [class.warn]="data.confirmColor === 'warn'">
      <mat-icon>{{ data.icon }}</mat-icon>
    </div>
  }

  @if (data.title) {
    <h2 mat-dialog-title>{{ data.title }}</h2>
  }

  <mat-dialog-content>
    <p class="confirm-message">{{ data.message }}</p>
  </mat-dialog-content>

  <mat-dialog-actions align="center">
    <button mat-stroked-button type="button" [mat-dialog-close]="false">
      {{ data.cancelText ?? 'Cancel' }}
    </button>
    <button
      mat-flat-button
      type="button"
      [color]="data.confirmColor ?? 'primary'"
      [mat-dialog-close]="true">
      {{ data.confirmText ?? 'OK' }}
    </button>
  </mat-dialog-actions>
</div>
