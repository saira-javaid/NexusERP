<div class="login-container">
  <mat-card class="login-card">
    <div class="login-header">
      <mat-icon class="logo">hub</mat-icon>
      <h1>Create Account</h1>
      <p>Join NexusERP as a team member</p>
    </div>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="name-row">
        <mat-form-field appearance="outline">
          <mat-label>First Name</mat-label>
          <input matInput formControlName="firstName" appAutofocus>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Last Name</mat-label>
          <input matInput formControlName="lastName">
        </mat-form-field>
      </div>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" type="email">
      </mat-form-field>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'">
        <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-hint>Min 8 chars, uppercase, lowercase, and a number</mat-hint>
      </mat-form-field>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Confirm Password</mat-label>
        <input matInput formControlName="confirmPassword" [type]="hideConfirm ? 'password' : 'text'">
        <button mat-icon-button matSuffix type="button" (click)="hideConfirm = !hideConfirm">
          <mat-icon>{{ hideConfirm ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        @if (form.hasError('passwordMismatch') && form.get('confirmPassword')?.touched) {
          <mat-error>Passwords do not match</mat-error>
        }
      </mat-form-field>
      <button mat-flat-button color="primary" class="full-width" type="submit" [disabled]="form.invalid">
        Create Account
      </button>
    </form>
    <p class="auth-footer">
      Already have an account?
      <a routerLink="/auth/login">Sign in</a>
    </p>
  </mat-card>
</div>
