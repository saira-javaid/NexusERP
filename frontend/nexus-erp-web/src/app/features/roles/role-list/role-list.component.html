<div class="page-container">
  <div class="page-header">
    <h1>Roles & Permissions</h1>
    @if (canManage) {
      <a mat-flat-button color="primary" routerLink="new">
        <mat-icon>add</mat-icon> New Role
      </a>
    }
  </div>

  <div class="filters">
    <mat-form-field appearance="outline">
      <mat-label>Search</mat-label>
      <input matInput [formControl]="searchControl" placeholder="Role name...">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
  </div>

  <div class="table-container">
    <table mat-table [dataSource]="roles()">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let r">
          {{ r.name }}
          @if (isSystemRole(r.name)) {
            <span class="system-badge">System</span>
          }
        </td>
      </ng-container>
      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
        <td mat-cell *matCellDef="let r">{{ r.description ?? '-' }}</td>
      </ng-container>
      <ng-container matColumnDef="users">
        <th mat-header-cell *matHeaderCellDef>Users</th>
        <td mat-cell *matCellDef="let r">{{ r.userCount }}</td>
      </ng-container>
      <ng-container matColumnDef="permissions">
        <th mat-header-cell *matHeaderCellDef>Permissions</th>
        <td mat-cell *matCellDef="let r">{{ r.permissionCount }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let r">
          @if (canManage) {
            <a mat-icon-button [routerLink]="[r.id, 'edit']" title="Edit"><mat-icon>edit</mat-icon></a>
            @if (!isSystemRole(r.name)) {
              <button mat-icon-button (click)="deleteRole(r)" title="Delete"><mat-icon>delete</mat-icon></button>
            }
          }
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <app-list-pagination
      [totalCount]="totalCount()"
      [pageIndex]="pageIndex()"
      [pageSize]="pageSize()"
      (pageChange)="onPageChange($event)" />
  </div>
</div>
