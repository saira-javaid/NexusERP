<div class="page-container">
  <div class="page-header">
    <h1>Audit Logs</h1>
    <mat-form-field appearance="outline">
      <mat-label>Entity type</mat-label>
      <mat-select [formControl]="entityControl">
        <mat-option [value]="null">All</mat-option>
        @for (type of entityTypes; track type) {
          <mat-option [value]="type">{{ type }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </div>

  <div class="table-container">
    <table mat-table class="responsive-table" [dataSource]="logs()">
      <ng-container matColumnDef="user">
        <th mat-header-cell *matHeaderCellDef>User</th>
        <td mat-cell *matCellDef="let l" data-label="User">{{ l.userName }}</td>
      </ng-container>
      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef>Action</th>
        <td mat-cell *matCellDef="let l" data-label="Action">{{ l.action }}</td>
      </ng-container>
      <ng-container matColumnDef="entity">
        <th mat-header-cell *matHeaderCellDef>Entity</th>
        <td mat-cell *matCellDef="let l" data-label="Entity">{{ l.entityType }}</td>
      </ng-container>
      <ng-container matColumnDef="date">
        <th mat-header-cell *matHeaderCellDef>Date</th>
        <td mat-cell *matCellDef="let l" data-label="Date">{{ l.createdAt | date:'medium' }}</td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="cols"></tr>
      <tr mat-row *matRowDef="let row; columns: cols;"></tr>
    </table>
    <app-list-pagination
      [totalCount]="totalCount()"
      [pageIndex]="pageIndex()"
      [pageSize]="pageSize()"
      (pageChange)="onPageChange($event)" />
  </div>
</div>
