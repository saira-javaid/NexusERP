services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: nexuserp-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "NexusERP@2024!"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "pidof sqlservr || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: nexuserp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    restart: on-failure
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexuserp-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=NexusERP;User Id=sa;Password=NexusERP@2024!;TrustServerCertificate=True"
      ConnectionStrings__Redis: "redis:6379"
      Jwt__Key: "NexusERP-Super-Secret-Key-Min-32-Chars-Long!"
      Jwt__Issuer: "NexusERP"
      Jwt__Audience: "NexusERP-Clients"
      Ai__OpenAi__ApiKey: ""
      Ai__OpenAi__Model: "gpt-4o-mini"
    ports:
      - "5000:8080"
    depends_on:
      sqlserver:
        condition: service_started
      redis:
        condition: service_started

  web:
    build:
      context: ./frontend/nexus-erp-web
      dockerfile: Dockerfile
    container_name: nexuserp-web
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  sqlserver-data:
  redis-data:
